# qa-handoff/{프로젝트명}/input-manifest.yaml 템플릿
# 자료 큐레이션 결과 (curate-input 스킬 단계 5 산출) + 인계·검수 환경 정보 (단계 11b)
# 본 양식은 spec ../../docs/qa-scout/spec.md §4-5 기반
# v0.2.5: 단계 11b (engagement context — gmail·테스트 URL·테스트 계정) 신규 슬롯 추가
# v0.2.7+: schema_version 유지. 옵션 블록 downstream_enrichment(§ 본 파일 하단)는
#   ../../docs/qa-scout/spec.md SDD §5-4에 따라 추가 가능.
#   기존 v0.2.6/v0.2.7 manifest는 본 블록 없이도 그대로 유효 (하위 호환).
# v0.2.9: 최종 읽기 산출물 2종(feature-spec.md + ui-menu-mindmap.md) 압축 + 메타/재현/후공정 자산 분리 (SDD ../../docs/qa-scout/spec.md).
#   schema_version 0.2.7 → 0.2.9 상향 + 신규 슬롯 5종(final_artifacts·execution_gate·playwright_verification·readme_discovery·two_doc_cross_check) 본 파일 하단 추가.
#   schema_version 0.2.7 manifest는 5 신규 슬롯 부재 상태로도 유효 (하위 호환). 0.2.9 schema는 5 슬롯 의무 — 마이그레이션 4단계(SDD §5-7)에서 빈 슬롯으로 추가, dogfood 시점에 채움.

schema_version: "0.2.9"
project: <project_name>           # 예: ebr
scan_root: <자료 폴더 경로>        # 예: D:/work/ebr-dev/docs (다중 시 배열)
scanned_at: <ISO 8601>            # 예: 2026-05-06T10:30:00

# 발견된 모든 파일
# v0.2.6: category(single) → categories(array) — 다중 카테고리 통합 매뉴얼 지원 (예: USER_MANUAL.md 한 파일이
# user-scenario·screen-layout·permission-matrix·glossary·operations-guide 5개에 기여)
# v0.2.7: status enum 5종 명시 (confirmed | related | unconfirmed | ignored | archived) — category 부재는
# missing_categories[]에서 관리. discovered_by + relevance_score + related_fr_candidates 신규.
found_files:
  - path: <상대 경로 NFC>          # v0.2.7 — NFD→NFC 정규화 (P3-1)
    mtime: <ISO 8601>
    git_commit: <hash | null>
    categories: [<list>]            # 배열 — PRD | user-scenario | state-transition | screen-layout | permission-matrix | glossary | erd-architecture | operations-guide
    primary_category: <category>    # 가장 강한 매핑 (단일)
    confidence: <★★★|★★|★|X>     # curator 카테고리 매핑 신뢰도
    status: <confirmed|related|unconfirmed|ignored|archived>  # v0.2.7 enum 5종
    discovered_by: <scout-curator|scout-supplementer|null>     # v0.2.7 신규
    relevance_score: <★★★|★★|★|null>                          # v0.2.7 신규 — supplementer 발굴만 채움 (PRD 연관성)
    related_fr_candidates: [<FR-NNN>, ...]                     # v0.2.7 신규 — supplementer 발굴만

# 빠진 카테고리 (단계 7 가이드 결과)
missing_categories:
  - category: <category>
    resolution: <live-verify|dev-ai|extracted|skip>
    note: <자유 텍스트>
    # live-verify: 라이브 URL+계정 받음
    # dev-ai: 개발자 자기 AI로 생성 요청
    # extracted: PRD 등 다른 자료에서 발췌 (G16)
    # skip: 생략

# 개발자 응답 이력 (단계 6, 8, 11)
developer_responses:
  - timestamp: <ISO 8601>
    question: <질의>
    answer: <답변>

# G16 PRD 다중 역할 처리 (있으면)
prd_extractions:
  - target_category: <category>   # 예: permission-matrix
    source_file: <PRD 파일명>
    source_section: <§x.x>
    output_file: <domain-knowledge/04-permission-matrix.{ext}>

# G17 받기 5종 다중 인풋 결합 (있으면)
multi_input_bindings:
  - target_category: <category>   # 예: user-scenario
    source_files:
      - <usecase 파일>
      - <Process Flow 파일>
    output_strategy: <separate-files|index-file>
    output_files:
      - <domain-knowledge/01-user-scenario-usecase.{ext}>
      - <domain-knowledge/01-user-scenario-flow.md>

# -------------------------------------------------------
# 인계·검수 환경 정보 (단계 11b 수집 — v0.2.5 신규)
# -------------------------------------------------------
# 단계 17a Sheets editor 권한 부여 + 단계 18c 개발팀 검수 + 라이브 검증을 위해 필수 수집.
# 운영 계정 절대 금지 — 테스트 전용 계정만 입력.
# 민감 접근 정보 (sensitive access data) 인계 시 보안 가이드 준수: zip 암호화 + 별도 채널 암호 전송, 1password,
# git 인계 시 본 파일을 .gitignore에 추가 또는 engagement-sensitive-access.yaml로 분리.
contact:
  developer_email: <gmail 주소>     # 예: <developer-gmail>@gmail.com — 단계 17a editor 권한 부여 대상
  note: <부가 메모>                # 예: 단계 18c 개발팀 검수 요청 대상

test_environment:
  server_port: <포트>              # 예: 8087
  local_url: <라이브 URL>          # 예: http://<host>:<port>
  type: <local | staging | dev>    # 환경 종류
  test_accounts:
    - id: <테스트 계정 ID>          # 예: <test-account-id>
      role: <역할>                 # 예: SYSTEM_ADMIN
      note: <비고>                 # 예: 테스트 전용 계정
  notes:
    - "운영 계정 사용 금지"
    - "테스트 URL이 로컬 개발 환경을 가리키는 경우 원격 공유 시 staging 환경 별도 구성 필요"

# -------------------------------------------------------
# 커버리지 자가 검증 결과 (단계 12a — v0.2.6 + v0.2.7 확장)
# -------------------------------------------------------
# operations-guide·PRD heading·검증자 라이브 단서 통합 트래킹.
coverage_check:
  guide_files:                       # 매뉴얼·가이드 자료 목록
    - path: <상대 경로>
      headings_total: <N>
  headings_total: <N>                # 합계
  headings_mapped: <M>               # F-NNN 매핑 성공
  headings_missed: <K>               # 미매핑 후보
  user_decisions:
    - heading: <heading 텍스트>      # 예: "USER_MANUAL §3 <기능 영역>"
      source_file: <파일 경로>
      decision: <include | merged | exclude>
      target_fr_id: <FR-NNN 또는 null>
      note: <자유 텍스트>

  # v0.2.7 신규 — PRD heading 별도 트래킹 (D 해결: PRD heading 누락 검증 게이트)
  prd_headings:
    - heading: <heading 텍스트>      # PRD 본문의 H1/H2/H3
      level: <1|2|3>
      mapped_fr: [<FR-NNN>, ...]    # 매핑된 F-NNN 리스트 (다중 가능)
      status: <mapped|unmapped|excluded>
      decision: <include|merged|exclude|null>
      reason: <자유 텍스트>

  # v0.2.7 신규 — 검증자(scout-verifier) 라이브 단서 결과 보존
  # 메인 scout이 단계 9f에서 사용자 인터뷰 후 본 슬롯에 기록 (verifier source 보존)
  live_verification_results:
    - target_marker: <FR-NNN>
      source: scout-verifier         # 단일 source enum — 추후 다른 출처 추가 시 확장
      live_url: <URL>
      dom_evidence: <DOM 인용>
      xpath_or_snapshot: <xpath 또는 스냅샷 N>
      user_decision: <confirmed|maintained|other>
      confirmed_policy: <text 또는 null>   # user_decision=confirmed 시 채움
      decided_at: <ISO 8601>

# -------------------------------------------------------
# 보충자 정독 스냅샷 (단계 8b — v0.2.7 신규, P1-1a)
# -------------------------------------------------------
# 메인 scout이 보충자 spawn 직전 candidate_files_at_start 스냅샷 기록.
# M1a 분모 안정화 — 실행 후 status 변경 영향 X.
supplementer_review:
  snapshot_at: <ISO 8601, 단계 8b 진입 직전>
  candidate_files_at_start: [<path list>]   # spawn 직전 status='unconfirmed' 전체
  reviewed_files: [<path list>]              # supplementer가 실제 정독한 파일
  skipped_files: [<path list>]               # 정독 못 한 파일 (크기 한계·읽기 실패 등)

# -------------------------------------------------------
# 자료 부족 마커 self-check 결과 (단계 9 docs-to-function-spec — v0.2.6 신규)
# -------------------------------------------------------
# scout-analyzer가 [자료 부족] 마커 부여 전 모든 인풋 자료에 grep 검증한 결과.
# rejected = grep hit 발견되어 마커 취소된 케이스 (본문에 인용으로 보강됨).
self_check_results:
  candidates_total: <N>              # 마커 후보
  confirmed: <M>                     # self-check 통과 (실제 자료 부족)
  rejected: <K>                      # grep hit으로 거부 (자료 발견 → 마커 취소)
  rejected_details:
    - candidate_keyword: <키워드>    # 예: "<권한 코드>" 또는 "<BR 코드>"
      found_in: <파일 §섹션>         # 예: "GXP_RBAC_PERMISSION_MATRIX.md §229"
      original_target: <FR-NNN 또는 컬럼>
      action_taken: <마커 취소 + 본문 인용 추가>

# -------------------------------------------------------
# 명시 제외 위치 (단계 7~8 — v0.2.6 신규)
# -------------------------------------------------------
# 사용자가 무시 결정한 자료 위치. archive·legacy·deprecated 폴더는 default 무시 X
# (P4 정책 — 결정 자료 가능성 있음 → 사용자 명시 확인 필수).
excluded_locations:
  - path: <폴더 경로>                # 예: docs/architecture/v1/
    reason: <v1 deprecated | 결정 자료 부재 | 사용자 명시 제외>
    confirmed_by_user: <ISO 8601>
    note: <자유 텍스트>

# -------------------------------------------------------
# ERD 상태 게이트 (단계 7~8 — v0.2.7 신규, P5-3)
# -------------------------------------------------------
# 분류 카테고리 8개 중 ERD/아키텍처 = 상태 게이트.
# enum 3종 중 하나로 통과: provided | generated-draft | explicitly-missing.
# explicitly-missing 시 erd_missing_reason 필수 입력.
erd_status: <provided|generated-draft|explicitly-missing>
erd_missing_reason: <text 또는 null>   # explicitly-missing 시 사유

# -------------------------------------------------------
# 받기 5종 인계 (옵션 C — v0.2.7 신규, P5-1·P5-2)
# -------------------------------------------------------
# domain-knowledge/ 폴더에 받기 5종 사본만 인계 (양식 변환 X).
# .meta.yaml 파일 5개는 v0.2.7에서 제거 — 본 슬롯에 통합.
# missing 카테고리는 output_files: [] (빈 배열) + note: "missing"으로 일관 표기.
received_artifacts:
  - category: <user-scenario|state-transition|screen-layout|permission-matrix|glossary>
    source_files: [<원본 경로>]
    output_files: [<domain-knowledge/0N-<name>.{ext}>]
    format: <markdown|mermaid|pdf|image|excel|null>
    multi_input_strategy: <none|separate-files|index-file>
    note: <자유 텍스트 또는 "missing">

# -------------------------------------------------------
# 2단계 hash 무결성 (v0.2.7 신규, P4)
# -------------------------------------------------------
# 단계 5 큐레이터 직후 scan + 단계 8d 분석가 spawn 직전 verify (원본 폴더)
# 단계 9a _source/ 사본 직후 copy + 단계 13 인계 직전 handoff (사본)
# 도구: scripts/hash-source-integrity.mjs (SHA-256)
source_integrity:
  hash_algorithm: SHA-256
  original_folder:
    scan_root: <자료 폴더 절대 경로>
    scanned_at: <단계 5 시점 ISO 8601>
    verified_at: <단계 8d 시점 ISO 8601>
    files:
      - relative_path: <scan_root 기준 상대 경로>
        hash_at_scan: <64자 hex>
        hash_at_verify: <64자 hex>
        match: <bool>
  _source_copy:
    scan_root: <_source/ 절대 경로>
    recorded_at: <9a 시점 ISO 8601>
    verified_at: <13 시점 ISO 8601>
    files:
      - relative_path: <_source/ 기준 상대 경로>
        hash_at_copy: <64자 hex>
        hash_at_handoff: <64자 hex>
        match: <bool>

# -------------------------------------------------------
# 마이그레이션 추적 (v0.2.7 신규, P5-5)
# -------------------------------------------------------
# 기존 산출물(v0.2.6 base)을 v0.2.7 plugin이 처리 시 단계 -1a에서 자동 발동.
# 4단계: dry-run preview → user confirm → backup → migrate.
# 자동 실행 X — user confirm 필수.
migration:
  from_schema: <"0.2"|null>
  to_schema: "0.2.7"
  preview_at: <ISO 8601, dry-run 시점>
  confirmed_at: <ISO 8601, user confirm Y 시점>
  backup_path: <qa-handoff/<project>.v0.2.6-backup-<timestamp>/>
  migrated_at: <ISO 8601, migrate 완료 시점>
  changes:
    - <"received_artifacts 슬롯 추가">
    - <".meta.yaml 5파일 삭제">
    - <"source_integrity 슬롯 추가 (recorded_at: null — 기존 산출물 hash 기록 X)">
    - <기타>

# -------------------------------------------------------
# downstream enrichment (옵션 — SDD ../../docs/qa-scout/spec.md)
# -------------------------------------------------------
# Scouter 3.0 후공정(연구팀 enrichment + Sheets 업로드 + Playwright reviewer)에서
# 깊은 화면 뎁스/핵심 기능 누락을 막기 위한 추적 슬롯. schema_version은 그대로 "0.2.7"이며
# 본 블록은 optional — 부재해도 manifest는 유효하다.
#
# 운영 룰:
#  - 개발자 deep-scope 답변은 시작 시점 1회 수집 + crawl 후 1회 재확인. 무한 질의 X.
#  - 위험 액션은 자동 클릭 금지 — 답변·관찰만 기록하고 reviewer가 NOT-TESTED-RISKY-ACTION으로 남긴다.
#  - 개발자가 명시 지정한 항목만 deep_screen_targets[] / research_seed.required_focus[]로 승격.
#  - 답변 부재 시 확정하지 않고 [자료 부족] 또는 [상세 화면 구조 부족]로 남긴다.
downstream_enrichment:
  developer_deep_scope:
    questions_round:
      - round: 1            # 1=pre-crawl, 2~=post-crawl 재확인
        asked_at: <ISO 8601>
        questions:
          - "기능정의서 누락이 절대 나면 안 되는 핵심 기능은?"
          - "화면 depth가 깊거나 내부 구조가 복잡한 화면/기능은?"
          - "변수·계산식·Step/Parameter·에디터·PDF 치환·상태별 편집 제한·승인·전자서명·감사추적 같은 복잡 동작이 있는가?"
          - "crawl 시 반드시 열어봐야 하는 상세 화면/탭/모달/패널/row action은?"
          - "클릭 금지 또는 관찰만 해야 하는 위험 액션은?"
        answered_at: <ISO 8601 또는 null>
        answers:
          core_features: [<자유 텍스트 list>]
          deep_screens: [<screen 또는 route 식별자 list>]
          complex_behaviors: [<예: variable-atomic, pdf-substitution, step-parameter, signature>]
          must_open_targets: [<탭/모달/패널/row action 식별자>]
          risky_actions: [<저장|삭제|승인|제출|신규버전 등>]
    confirmation_rounds:
      - round: 2
        asked_at: <ISO 8601>
        candidates_presented:
          - id: <후보 id>
            evidence: <문서/화면/코드 인용>
        answered_at: <ISO 8601 또는 null>
        confirmed: [<id list>]
        additional:
          core_features: [<신규 핵심 기능>]
          deep_screens: [<신규 deep screen>]
          risky_actions: [<신규 위험 액션>]
    rejected_deep_scope_candidates:
      - id: <후보 id>
        rejected_at: <ISO 8601>
        reason: <자유 텍스트>

  deep_screen_targets:
    - id: <SCR-<PROJECT>-NNN 또는 route slug>     # 화면 식별자
      route: </path/to/screen>
      reason:
        - prd-keyword                          # 화면명·경로에 detail/edit/editor 등 포함
        - prd-uses-step-parameter-variable     # PRD/UC에 Step·Parameter·Variable·Formula 언급
        - capture-inputs-empty                 # 화면 capture가 inputs:[]이나 문서엔 입력/편집
        - multi-table-or-modal                 # 한 화면에 테이블 2+·modal trigger·nested tab
        - gxp-data-integrity                   # 전자서명·감사추적·승인·불변성·버전 고정
        - developer-pinned                     # 개발자 deep-scope 인터뷰에서 직접 지정
      gap_candidates: [<structure-depth-gap|behavior-depth-gap|variable-behavior-gap|state-visibility-gap|role-visibility-gap|risky-action-gap|doc-screen-conflict>]
      required_observations:
        - tabs: [<list>]
        - modals: [<list>]
        - panels: [<list>]
        - row_actions: [<list>]
        - dynamic_regions: [<list>]
      risky_actions_not_clicked: [<버튼/액션 식별자>]
      evidence_refs:
        prd: [<파일:line>]
        uc: [<파일:section>]
        design: [<파일:line>]
        ui_capture: [<knowledge/{project}/shared/pages/*.yaml>]

  research_seed:
    required_focus:
      - focus: <자유 텍스트>                   # 예: "Step 추가/수정/삭제/순서 조정 lifecycle"
        source: <문서 또는 화면 인용>
        deep_screen_target_ref: <id>          # 위 deep_screen_targets[].id 참조
    forbidden_assumptions:
      - <"화면에 보이지 않는 기능을 단정하지 말 것">
      - <"코드 한 줄로 정책 단정하지 말 것">
    risky_action_policy: "관찰만 — Playwright/MCP가 자동 클릭 금지. reviewer는 NOT-TESTED-RISKY-ACTION으로 남긴다."

# =======================================================
# v0.2.9 신규 슬롯 5종 (SDD ../../docs/qa-scout/spec.md + 2026-05-22 UX 강화)
# =======================================================
# 본 5 슬롯은 v0.2.9 schema에서 의무. v0.2.7 호환 manifest는 부재해도 유효(마이그레이션 4단계 §5-7에서 빈 슬롯 추가).
# 5 슬롯 각각의 단계 매핑:
#   - final_artifacts: 단계 9d (final hash 기록) — SDD §4 산출물 #2/#3
#   - execution_gate:   단계 1c (3문 묶음 1회 게이트) — SDD §5-10
#   - playwright_verification: 단계 9e (Playwright 라이브 검증) — ../../docs/qa-scout/spec.md
#   - readme_discovery: 단계 4a (자료 폴더 경로 수신 직후·자동 스캔 직전) — SDD §5-11
#   - two_doc_cross_check: 단계 9d.5 (cross-check 게이트) — SDD §5-9
# 자동 보정 금지 — 모든 슬롯은 사용자/개발자 명시 입력만 반영 (Auto-Healing Loop 차단).

# -------------------------------------------------------
# 1) final_artifacts — 최종 읽기 산출물 2종 매핑 (SDD §4 + §5-1-1/§5-1-2)
# -------------------------------------------------------
# scout v0.2.9는 최종 읽기 산출물을 2종으로 압축한다. 나머지(input-manifest·scout-log·_source·research-seed·ui-crawl-manifest)는
# 메타·재현·후공정 자산이며 최종 읽기 산출물이 아니다. Sheets 이행 대상은 feature_spec만 — ui_menu_mindmap은 markdown 보조.
final_artifacts:
  feature_spec: "feature-spec.md"
  ui_menu_mindmap: "ui-menu-mindmap.md"
  readable_outputs_count: 2
  sheets_target: "feature_spec only"        # ui-menu-mindmap.md는 Sheets 이행 X — markdown 보조 산출물
  deprecated_readable_outputs:               # v0.2.8까지의 분산 산출물 참조 (마이그레이션 4단계 §5-7 시 본 슬롯과 매핑)
    - "feature-spec/01_표지.md"
    - "feature-spec/02_변경이력.md"
    - "feature-spec/03_기능정의서.md"
    - "feature-spec/04_비기능요구.md"
    - "feature-spec/05_사용자스토리.md"
    - "domain-knowledge/02-state-transition.{ext}"
    - "domain-knowledge/03-screen-layout.{ext}"
    - "domain-knowledge/04-permission-matrix.{ext}"
    - "domain-knowledge/05-glossary.{ext}"
  hash:                                      # 단계 9d에서 SHA-256 기록 (final 산출물 무결성)
    feature_spec_sha256: null
    ui_menu_mindmap_sha256: null
    hashed_at: null                          # ISO 8601 — 9d 진입 시점

# -------------------------------------------------------
# 2) execution_gate — 초기 execution gate (단계 1c, SDD §5-10)
# -------------------------------------------------------
# 액션별 매번 묻기 폐기. 환경·금지 액션·진행 승인 3문 1회로 결정.
# decision 4종 × reviewer_status 4종 1:1 매핑 강제 (SDD §5-10-2):
#   full-execute       → EXECUTED-TEST-ENV
#   partial-execute    → PARTIAL-OBSERVED
#   observe-only       → NOT-TESTED-PROD-RISK
#   context-insufficient → CONTEXT-INSUFFICIENT
execution_gate:
  asked_at: null                                                                       # 단계 1c 진입 시점 ISO 8601
  environment_class: "<local | dev | qa | staging | prod | unknown>"                   # 1번 답변
  has_prod_or_real_data: "<true | false | unknown>"                                    # 1번 답변 보조 — 운영성 데이터 혼재 여부
  forbidden_actions: []                                                                # 2번 답변 — 자유 텍스트 list (예: 저장·삭제·승인·제출·전자서명·신규 버전 생성)
  allowed_state_change_scope: []                                                       # forbidden_actions 외 허용된 상태 변경 액션 범위
  proceed_approved: null                                                               # 3번 답변 bool
  decision: "<full-execute | partial-execute | observe-only | context-insufficient>"   # 4종 enum
  reviewer_status: "<EXECUTED-TEST-ENV | PARTIAL-OBSERVED | NOT-TESTED-PROD-RISK | CONTEXT-INSUFFICIENT>"
  confirmed_by: null                                                                   # 결정 확인 주체 (개발자 이름 또는 메타)
  confirmed_at: null                                                                   # 결정 확정 시점 ISO 8601
  notes: ""                                                                            # 자유 텍스트 — has_prod_or_real_data 사유, forbidden_actions 출처 등

# -------------------------------------------------------
# 3) playwright_verification — Playwright 라이브 검증 (단계 9e)
# -------------------------------------------------------
# 단계 9e는 [자료 부족] 조건 없이 기본 실행 시도한다.
# RUN은 브라우저 실행 + 로그인 또는 로그인 불필요 확인 + 1개 이상 화면 방문 + evidence 1건 이상일 때만 허용.
playwright_verification:
  status: "<RUN | SKIP | FAIL | BLOCKED>"
  tested_url: null
  login_account_role: null
  screens_visited: 0
  evidence_files: []                                                                   # RUN이면 1건 이상 필수
  spec_missing_count: 0                                                                # 화면에는 있으나 문서에 없는 항목
  screen_missing_count: 0                                                              # 문서에는 있으나 화면에서 확인되지 않는 항목
  mismatch_count: 0                                                                    # 문서-화면 불일치
  forbidden_actions_observed: []                                                       # {screen, action, selector, reason}
  skip_reason: null                                                                    # SKIP일 때 필수
  blocked_reason: null                                                                 # BLOCKED일 때 필수
  failed_reason: null                                                                  # FAIL일 때 필수
  notes: []

# -------------------------------------------------------
# 4) readme_discovery — README discovery gate (단계 4a, SDD §5-11)
# -------------------------------------------------------
# 자료 폴더 경로 수신 직후·단계 5 자동 스캔 직전 1회 실시. README는 요구사항 SoT가 아니라 탐색 힌트.
# 발견 경로는 즉시 자료 폴더 포함 X — 개발자 확인 후 found_files[]/received_artifacts/downstream_enrichment 승격.
# AGENTS.md / CLAUDE.md / .cursorrules는 운영 지침으로 별도 기록, 제품 요구사항 X.
readme_discovery:
  scanned: null                                                                        # true/false (false면 README 부재 — 게이트 skip)
  scanned_at: null                                                                     # 단계 4a 진입 시점 ISO 8601
  scan_roots: []                                                                       # repo root + 자료 폴더 경로
  readme_files: []                                                                     # 발견 README list — {path, type<readme|docs-readme|nested-readme>, mtime, git_commit}
  referenced_paths: []                                                                 # README가 인용한 경로 list — {path, kind<prd|uc|design|spec|api|docs|other>, developer_decision<include|exclude|unknown>, promoted_to, note}
  developer_confirmed_paths: []                                                        # 개발자가 include로 확정한 경로 (found_files[] 승격 후보)
  rejected_paths: []                                                                   # 개발자가 exclude했거나 stale로 분류된 경로 — {path, reason}
  agent_guidance_files: []                                                             # AGENTS.md / CLAUDE.md / .cursorrules — {path, kind, note} (운영 지침, 제품 요구사항 X)
  extracted_project_hints:                                                             # 추출 메타 — feature_modules, environment_hints, api_docs_links
    feature_modules: []
    environment_hints:
      local_url: null
      test_accounts_hint: null
      run_commands: []
    api_docs_links: []
  notes: ""

# -------------------------------------------------------
# 5) two_doc_cross_check — 기능정의서 ↔ ui-menu-mindmap 상호 검증 결과 요약 (단계 9d.5, SDD §5-9)
# -------------------------------------------------------
# 자세한 행 단위 결과는 feature-spec.md §8(방향 A) + ui-menu-mindmap.md §6(방향 B)에 양쪽 분리 기록 — 별도 제3 문서 금지.
# 본 슬롯은 메타 요약만. result 4종 enum 판정 룰은 SDD §5-9-4 참조.
two_doc_cross_check:
  executed_at: null                                                                    # 단계 9d.5 진입 시점 ISO 8601
  result: "<PASS | PASS_WITH_NOTES | FAIL | NOT_RUN>"                                  # NOT_RUN = 마이그레이션 직후 빈 슬롯 또는 미실행
  fr_mapping_rate: 0.00                                                                # 방향 A 검증 1 — FR 총 수 대비 화면 매핑 성공률 (0.00~1.00)
  leaf_mapping_rate: 0.00                                                              # 방향 B 검증 1 — leaf 노드 총 수 대비 FR 인용 성공률 (0.00~1.00)
  risky_action_dual_marked: false                                                      # forbidden_actions가 양쪽 문서 모두에 표시됐는지 (full-execute decision은 n/a)
  unmapped_fr: []                                                                      # 방향 A 미매핑 FR list — 모두 marker 부착됨 (PASS_WITH_NOTES 전제)
  unmapped_leaf: []                                                                    # 방향 B 미매핑 leaf 노드 경로 list — 모두 SPEC-MISSING/[문서 근거 부족] 부착됨
  risky_action_one_sided: []                                                           # 한쪽 문서에만 표시된 forbidden_actions — FAIL 시에만 채움
  notes: []                                                                            # PASS_WITH_NOTES/FAIL 사유 list
  artifacts:
    feature_spec_section: "feature-spec.md#§8-마인드맵-대조-결과"
    ui_menu_mindmap_section: "ui-menu-mindmap.md#§6-기능정의서-대조-결과"
