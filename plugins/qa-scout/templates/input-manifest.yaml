# qa-handoff/{프로젝트명}/input-manifest.yaml 템플릿
# 자료 큐레이션 결과 (curate-input 스킬 단계 5 산출)
# 본 양식은 spec docs/qa-scout/spec.md §4-5 기반

project: <project_name>           # 예: myapp
scan_root: <자료 폴더 경로>        # 예: D:/work/myapp-dev/docs (다중 시 배열)
scanned_at: <ISO 8601>            # 예: 2026-05-06T10:30:00

# 발견된 모든 파일
found_files:
  - path: <상대 경로>
    mtime: <ISO 8601>
    git_commit: <hash | null>
    category: <category | null>   # PRD | user-scenario | state-transition | screen-layout | permission-matrix | glossary | erd-architecture | null
    confidence: <★★★|★★|★|X>
    status: <confirmed|skipped|missing>

# 빠진 카테고리 (단계 7 가이드 결과)
missing_categories:
  - category: <category>
    resolution: <live-verify|dev-ai|extracted|skip>
    note: <자유 텍스트>
    # live-verify: 라이브 URL+계정 받음
    # dev-ai: 개발자 자기 AI로 생성 요청
    # extracted: PRD 등 다른 자료에서 발췌 (G16)
    # skip: 생략

# 인계·검수 환경 정보 (단계 11b 수집)
# 단계 17a Sheets 공유 + 단계 18a~c 사람 검수·자동화 회귀 진행에 필수
contact:
  developer:
    name: <개발자 이름>
    email: <개발자 Google email>      # 단계 17a share_spreadsheet 대상 (editor 권한)
    role: <역할 — 예: backend dev, full-stack 등>
  reviewer:
    email: <QA 또는 사내 검수자 email — 옵션 (markdown-to-sheets 시 QA 본인 OAuth 자동 처리되면 생략)>

test_environment:
  url: <https://test-or-staging-domain.example.com>   # 운영 도메인 X
  type: <dev | staging | UAT>
  admin:
    id: <테스트 어드민 ID>
    password: <테스트 어드민 password>   # 테스트 전용 — 운영 계정 절대 X
    sso: <SSO 토큰 또는 추가 인증 정보 — 옵션>
    mfa_notes: <MFA 사용 시 우회 방법 — 옵션>
  notes: <환경 특이사항 자유 텍스트>
# 보안 주의: 본 섹션은 credentials 포함. git push 인계 시 노출 위험.
# 권장 인계 매체:
#   - zip 암호화 + 별도 채널로 암호 전송
#   - 1password 또는 암호화 메시지 (Slack DM with vault link)
#   - git 인계 시 .gitignore에 input-manifest.yaml 추가 또는 credentials를 engagement-secrets.yaml로 분리

# 개발자 응답 이력 (단계 6, 8, 11)
developer_responses:
  - timestamp: <ISO 8601>
    question: <질의>
    answer: <답변>

# G16 PRD 다중 역할 처리 (있으면)
prd_extractions:
  - target_category: <category>   # 예: permission-matrix
    source_file: <PRD 파일명>
    source_section: <§x.x>
    output_file: <domain-knowledge/04-permission-matrix.{ext}>

# G17 받기 5종 다중 인풋 결합 (있으면)
multi_input_bindings:
  - target_category: <category>   # 예: user-scenario
    source_files:
      - <usecase 파일>
      - <Process Flow 파일>
    output_strategy: <separate-files|index-file>
    output_files:
      - <domain-knowledge/01-user-scenario-usecase.{ext}>
      - <domain-knowledge/01-user-scenario-flow.md>
